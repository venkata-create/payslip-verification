<!DOCTYPE html>
<html>
<head>
  <title>Payslip Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #1f4e79, #3c8dbc);
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: inline-block;
      position: relative;
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #28a745;
      color: #fff;
      padding: 5px 10px;
      border-radius: 20px;
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="card">
  <div class="badge">✔ Verified</div>

  <img src="https://raw.githubusercontent.com/venkata-create/payslip-verification/main/frugal-testing.png" class="logo">

  <h2>Payslip Verification</h2>

  <p><b>Employee:</b> <span id="name"></span></p>
  <p><b>Net Pay:</b> <span id="amount"></span></p>
  <p><b>Month:</b> <span id="month"></span></p>

  <p>For queries: <b>bgv@frugaltesting.com</b></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById("name").innerText = params.get("name");
  document.getElementById("amount").innerText = params.get("amount");
  document.getElementById("month").innerText = params.get("month");
</script>

</body>
</html>
