<!DOCTYPE html>
<html>
<head>
  <title>Payslip Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #1f4e79, #3c8dbc);
      color: #333;
    }

    .card {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      display: inline-block;
      max-width: 350px;
      width: 100%;
      position: relative;
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    h2 {
      color: #1f4e79;
      margin-bottom: 15px;
    }

    p {
      font-size: 15px;
      margin: 8px 0;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }

    /* ✅ VERIFIED BADGE */
    .badge {
      position: absolute;
      top: -12px;
      right: -12px;
      background: #28a745;
      color: white;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* subtle glow effect */
    .badge::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      box-shadow: 0 0 10px #28a745;
      opacity: 0.6;
    }

  </style>
</head>

<body>

<div class="card">

  <!-- ✅ VERIFIED BADGE -->
  <div class="badge">✔ Verified</div>

  <!-- ✅ COMPANY LOGO -->
  <img src="https://drive.google.com/uc?export=view&id=1LuXPtba9JGsom7I67Q5h7yzSLiTGOayo" class="logo">

  <h2>Payslip Verification</h2>

  <p><b>Employee:</b> <span id="name"></span></p>
  <p><b>Net Pay:</b> <span id="amount"></span></p>
  <p><b>Month:</b> <span id="month"></span></p>

  <div class="footer">
    For queries: <b>bgv@frugaltesting.com</b>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("name").innerText = params.get("name");
  document.getElementById("amount").innerText = params.get("amount");
  document.getElementById("month").innerText = params.get("month");
</script>

</body>
</html>
